<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Daftar — Dekat di Hati</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Lora:ital,wght@0,400;1,400&family=Nunito:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--cream:#fdf6ee;--rose:#c9747a;--rose-deep:#a85560;--wine:#6b2d3e;--ink:#2c1a1a;--muted:#8a6a6a}
    body{font-family:'Nunito',sans-serif;background:var(--cream);min-height:100vh;display:flex;align-items:center;justify-content:center;
    background-image:radial-gradient(ellipse at 20% 80%,rgba(201,116,122,0.1) 0%,transparent 50%),radial-gradient(ellipse at 80% 20%,rgba(201,168,76,0.07) 0%,transparent 40%)}
    .box{width:100%;max-width:440px;padding:2.5rem;background:rgba(255,255,255,0.75);border:1px solid rgba(201,116,122,0.15);border-radius:24px;backdrop-filter:blur(10px);box-shadow:0 8px 40px rgba(107,45,62,0.08)}
    h1{font-family:'Playfair Display',serif;font-size:1.9rem;color:var(--wine);margin-bottom:0.25rem}
    .sub{font-family:'Lora',serif;font-style:italic;color:var(--muted);font-size:0.85rem;margin-bottom:1.8rem}
    .row{display:grid;grid-template-columns:1fr 1fr;gap:0.8rem}
    .form-group{margin-bottom:1rem}
    label{display:block;font-size:0.75rem;font-weight:600;color:var(--muted);letter-spacing:0.07em;text-transform:uppercase;margin-bottom:0.35rem}
    input,select{width:100%;padding:.7rem 1rem;border:1.5px solid rgba(201,116,122,0.25);border-radius:10px;font-family:'Nunito',sans-serif;font-size:.88rem;background:rgba(255,255,255,.85);color:var(--ink);outline:none;transition:border-color .2s,box-shadow .2s}
    input:focus,select:focus{border-color:var(--rose);box-shadow:0 0 0 3px rgba(201,116,122,0.12)}
    .btn{width:100%;padding:.8rem;background:linear-gradient(135deg,var(--rose),var(--rose-deep));color:#fff;border:none;border-radius:50px;font-family:'Nunito',sans-serif;font-size:.92rem;font-weight:700;cursor:pointer;box-shadow:0 4px 16px rgba(168,85,96,.3);transition:all .2s;margin-top:.4rem}
    .btn:hover{transform:translateY(-1px);box-shadow:0 6px 22px rgba(168,85,96,.4)}
    .switch{text-align:center;margin-top:1.2rem;font-size:.82rem;color:var(--muted)}
    .switch a{color:var(--rose-deep);font-weight:600;text-decoration:none}
    .err{color:#c0392b;font-size:.79rem;margin-top:.4rem;display:none}
    .ok{color:#27ae60;font-size:.82rem;text-align:center;margin-top:.6rem;display:none;font-family:'Lora',serif;font-style:italic}
  </style>
</head>
<body>
<div class="box">
  <h1>Buat Akun 💌</h1>
  <p class="sub">Mulai perjalanan cinta jarak jauh kalian</p>
  <div class="row">
    <div class="form-group"><label>Nama Kamu</label><input id="name" placeholder="Sayang..."/></div>
    <div class="form-group"><label>Kota Kamu</label><input id="city" placeholder="Jakarta"/></div>
  </div>
  <div class="form-group">
    <label>Zona Waktu</label>
    <select id="tz">
      <option value="Asia/Jakarta">WIB — Jakarta</option>
      <option value="Asia/Makassar">WITA — Makassar</option>
      <option value="Asia/Jayapura">WIT — Jayapura</option>
      <option value="Asia/Singapore">SGT — Singapura</option>
      <option value="Asia/Kuala_Lumpur">MYT — Kuala Lumpur</option>
      <option value="Asia/Tokyo">JST — Tokyo</option>
      <option value="Europe/London">GMT — London</option>
      <option value="America/New_York">EST — New York</option>
      <option value="America/Los_Angeles">PST — Los Angeles</option>
    </select>
  </div>
  <div class="form-group"><label>Email</label><input type="email" id="email" placeholder="kamu@email.com"/></div>
  <div class="form-group"><label>Password</label><input type="password" id="pass" placeholder="Min. 6 karakter"/></div>
  <p class="err" id="err"></p>
  <button class="btn" onclick="doRegister()">Daftar & Mulai 🌸</button>
  <p class="ok" id="ok">Berhasil! Cek email untuk verifikasi, lalu masuk 💕</p>
  <p class="switch">Sudah punya akun? <a href="/login">Masuk</a></p>
</div>
<script>
async function doRegister(){
  const name=document.getElementById('name').value;
  const city=document.getElementById('city').value;
  const tz=document.getElementById('tz').value;
  const email=document.getElementById('email').value;
  const pass=document.getElementById('pass').value;
  const err=document.getElementById('err');
  const ok=document.getElementById('ok');
  err.style.display='none'; ok.style.display='none';
  if(!name||!email||!pass){err.textContent='Isi semua kolom ya 🥺';err.style.display='block';return;}
  if(pass.length<6){err.textContent='Password minimal 6 karakter';err.style.display='block';return;}
  const res=await fetch('/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name,city,timezone:tz,email,password:pass})});
  const data=await res.json();
  if(data.success){ok.style.display='block';}
  else{err.textContent=data.error||'Gagal daftar, coba lagi';err.style.display='block';}
}
document.addEventListener('keydown',e=>{if(e.key==='Enter')doRegister();});
</script>
</body>
</html>
